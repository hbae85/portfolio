<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 주식 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #212126;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e8c97a;
    --accent2: #c8a84a;
    --up: #e05252;
    --down: #5294e0;
    --up-bg: rgba(224,82,82,0.12);
    --down-bg: rgba(82,148,224,0.12);
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .header-date { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 1.5rem;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--accent); }

  .section { display: none; }
  .section.active { display: block; }

  /* Metric cards */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
  }
  .metric-label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
  .metric-value { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .metric-value.pos { color: var(--up); }
  .metric-value.neg { color: var(--down); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
  }
  td.name-cell { font-family: var(--font); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* Badge */
  .badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-up { background: var(--up-bg); color: var(--up); }
  .badge-dn { background: var(--down-bg); color: var(--down); }
  .badge-buy { background: var(--up-bg); color: var(--up); }
  .badge-sell { background: var(--down-bg); color: var(--down); }

  /* Stock name */
  .stock-name { font-weight: 700; font-size: 14px; font-family: var(--font); color: var(--text); }
  .stock-code { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input, select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* Button */
  .btn {
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--up); border-color: var(--up); }

  /* Chart */
  .chart-wrap { position: relative; width: 100%; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Message */
  .msg { font-size: 12px; margin-top: 8px; color: var(--accent); min-height: 18px; }
  .msg.err { color: var(--up); }
  .empty { text-align: center; color: var(--muted); padding: 2.5rem; font-size: 13px; }

  .price-note { font-size: 11px; color: var(--muted); margin-top: 10px; opacity: 0.7; }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

  .text-right { text-align: right; }
  .pos { color: var(--up); }
  .neg { color: var(--down); }
</style>
</head>
<body>

<header>
  <div class="logo">Portfolio <span>tracker</span></div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('portfolio', this)">포트폴리오</button>
    <button class="tab" onclick="showTab('add', this)">종목 추가</button>
    <button class="tab" onclick="showTab('history', this)">매매 내역</button>
    <button class="tab" onclick="showTab('chart', this)">차트</button>
  </div>

  <!-- 포트폴리오 -->
  <div id="tab-portfolio" class="section active">
    <div class="metrics" id="metrics-row"></div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">보유 종목</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>종목</th>
            <th class="text-right">평균단가</th>
            <th class="text-right">현재가</th>
            <th class="text-right">수량</th>
            <th class="text-right">평가금액</th>
            <th class="text-right">수익률</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="stock-table"></tbody>
      </table>
    </div>
    <p class="price-note">* 현재가는 수동 입력 방식입니다. 현재가 업데이트 탭에서 최신 시세를 입력하세요.</p>
  </div>

  <!-- 종목 추가 -->
  <div id="tab-add" class="section">
    <div class="card">
      <div class="card-header"><div class="card-title">매수 기록 추가</div></div>
      <div class="form-grid">
        <div class="form-group"><label>종목명</label><input id="inp-name" type="text" placeholder="예: 삼성전자"></div>
        <div class="form-group"><label>종목코드</label><input id="inp-code" type="text" placeholder="005930"></div>
        <div class="form-group"><label>수량 (주)</label><input id="inp-qty" type="number" placeholder="100" min="1"></div>
        <div class="form-group"><label>매수 단가 (원)</label><input id="inp-buy" type="number" placeholder="75000" min="1"></div>
        <div class="form-group"><label>현재가 (원)</label><input id="inp-cur" type="number" placeholder="78000" min="1"></div>
        <div class="form-group"><label>매수일</label><input id="inp-date" type="date"></div>
      </div>
      <button class="btn" onclick="addStock()">추가하기</button>
      <p class="msg" id="add-msg"></p>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">현재가 업데이트</div></div>
      <table>
        <thead><tr><th>종목</th><th class="text-right">현재가</th><th></th></tr></thead>
        <tbody id="update-table"></tbody>
      </table>
    </div>
  </div>

  <!-- 매매 내역 -->
  <div id="tab-history" class="section">
    <div class="card">
      <div class="card-header"><div class="card-title">매도 기록 추가</div></div>
      <div class="form-grid">
        <div class="form-group"><label>종목 선택</label><select id="sell-name"></select></div>
        <div class="form-group"><label>수량</label><input id="sell-qty" type="number" placeholder="50" min="1"></div>
        <div class="form-group"><label>매도 단가 (원)</label><input id="sell-price" type="number" placeholder="80000" min="1"></div>
        <div class="form-group"><label>매도일</label><input id="sell-date" type="date"></div>
      </div>
      <button class="btn" onclick="addSell()">매도 기록</button>
      <p class="msg" id="sell-msg"></p>
    </div>

    <div class="divider"></div>

    <div class="card">
      <div class="card-header"><div class="card-title">전체 매매 내역</div></div>
      <table>
        <thead>
          <tr>
            <th>날짜</th><th>종목</th><th>구분</th>
            <th class="text-right">수량</th><th class="text-right">단가</th><th class="text-right">금액</th><th></th>
          </tr>
        </thead>
        <tbody id="history-table"></tbody>
      </table>
      <div id="history-empty" class="empty" style="display:none">매매 내역이 없습니다.</div>
    </div>
  </div>

  <!-- 차트 -->
  <div id="tab-chart" class="section">
    <div class="charts-grid">
      <div class="card">
        <div class="card-header"><div class="card-title">종목별 비중</div></div>
        <div class="chart-wrap" style="height:220px"><canvas id="pieChart" role="img" aria-label="종목별 포트폴리오 비중 차트">종목별 평가금액 비중</canvas></div>
        <div class="legend" id="pie-legend"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">수익률 비교</div></div>
        <div class="chart-wrap" id="bar-wrap"><canvas id="barChart" role="img" aria-label="종목별 수익률 막대 차트">종목별 수익률</canvas></div>
      </div>
    </div>
  </div>

</div>

<script>
let stocks = JSON.parse(localStorage.getItem('stocks') || 'null') || [
  { name:'삼성전자', code:'005930', qty:100, avgPrice:72000, curPrice:78500, date:'2024-01-15' },
  { name:'SK하이닉스', code:'000660', qty:30, avgPrice:145000, curPrice:195000, date:'2024-02-20' },
  { name:'한미반도체', code:'042700', qty:50, avgPrice:95000, curPrice:88000, date:'2024-03-10' }
];
let history = JSON.parse(localStorage.getItem('history') || 'null') || [
  { date:'2024-01-15', name:'삼성전자', type:'buy', qty:100, price:72000 },
  { date:'2024-02-20', name:'SK하이닉스', type:'buy', qty:30, price:145000 },
  { date:'2024-03-10', name:'한미반도체', type:'buy', qty:50, price:95000 }
];
let pieChart = null, barChart = null;

const COLORS = ['#e8c97a','#5294e0','#52c0a8','#c05292','#c08052','#9052c0'];

function save() {
  localStorage.setItem('stocks', JSON.stringify(stocks));
  localStorage.setItem('history', JSON.stringify(history));
}
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function pct(a, b) { return (((b - a) / a) * 100).toFixed(2); }
function today() { return new Date().toISOString().slice(0,10); }

function renderMetrics() {
  const totalCost = stocks.reduce((s,x) => s + x.qty * x.avgPrice, 0);
  const totalVal  = stocks.reduce((s,x) => s + x.qty * x.curPrice, 0);
  const profit = totalVal - totalCost;
  const profitPct = totalCost > 0 ? (profit/totalCost*100).toFixed(2) : 0;
  const cl = profit >= 0 ? 'pos' : 'neg';
  const sign = v => v >= 0 ? '+' : '';
  document.getElementById('metrics-row').innerHTML = `
    <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value">₩${fmt(totalCost)}</div></div>
    <div class="metric"><div class="metric-label">총 평가금액</div><div class="metric-value">₩${fmt(totalVal)}</div></div>
    <div class="metric"><div class="metric-label">평가손익</div><div class="metric-value ${cl}">${sign(profit)}₩${fmt(profit)}</div></div>
    <div class="metric"><div class="metric-label">수익률</div><div class="metric-value ${cl}">${sign(profitPct)}${profitPct}%</div></div>
    <div class="metric"><div class="metric-label">보유 종목</div><div class="metric-value">${stocks.length}개</div></div>
  `;
}

function renderTable() {
  const tb = document.getElementById('stock-table');
  if (!stocks.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">종목이 없습니다. 종목 추가 탭에서 추가하세요.</td></tr>'; return; }
  tb.innerHTML = stocks.map((s,i) => {
    const val = s.qty * s.curPrice;
    const p = pct(s.avgPrice, s.curPrice);
    const up = parseFloat(p) >= 0;
    return `<tr>
      <td class="name-cell"><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></td>
      <td class="text-right">₩${fmt(s.avgPrice)}</td>
      <td class="text-right">₩${fmt(s.curPrice)}</td>
      <td class="text-right">${fmt(s.qty)}주</td>
      <td class="text-right">₩${fmt(val)}</td>
      <td class="text-right"><span class="badge ${up?'badge-up':'badge-dn'}">${up?'+':''}${p}%</span></td>
      <td class="text-right"><button class="btn-ghost" onclick="removeStock(${i})">삭제</button></td>
    </tr>`;
  }).join('');
}

function renderUpdateTable() {
  const tb = document.getElementById('update-table');
  if (!stocks.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">종목이 없습니다.</td></tr>'; return; }
  tb.innerHTML = stocks.map((s,i) => `
    <tr>
      <td class="name-cell"><div class="stock-name">${s.name}</div></td>
      <td class="text-right"><input type="number" id="upd-${i}" value="${s.curPrice}" style="width:130px;text-align:right"></td>
      <td class="text-right"><button class="btn" style="padding:6px 14px;font-size:12px" onclick="updatePrice(${i})">업데이트</button></td>
    </tr>
  `).join('');
}

function renderHistory() {
  const tb = document.getElementById('history-table');
  const em = document.getElementById('history-empty');
  const sel = document.getElementById('sell-name');
  sel.innerHTML = stocks.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  if (!history.length) { tb.innerHTML = ''; em.style.display = 'block'; return; }
  em.style.display = 'none';
  tb.innerHTML = [...history].reverse().map((h,i) => {
    const amt = h.qty * h.price;
    return `<tr>
      <td>${h.date}</td>
      <td class="name-cell">${h.name}</td>
      <td><span class="badge ${h.type==='buy'?'badge-buy':'badge-sell'}">${h.type==='buy'?'매수':'매도'}</span></td>
      <td class="text-right">${fmt(h.qty)}주</td>
      <td class="text-right">₩${fmt(h.price)}</td>
      <td class="text-right">₩${fmt(amt)}</td>
      <td class="text-right"><button class="btn-ghost" onclick="removeHistory(${history.length-1-i})">삭제</button></td>
    </tr>`;
  }).join('');
}

function renderCharts() {
  if (!stocks.length) return;
  const vals  = stocks.map(s => s.qty * s.curPrice);
  const names = stocks.map(s => s.name);
  const pcts  = stocks.map(s => parseFloat(pct(s.avgPrice, s.curPrice)));
  const colors = stocks.map((_,i) => COLORS[i % COLORS.length]);
  const total = vals.reduce((a,b) => a+b, 0);

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: names, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 2, borderColor: '#18181c' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '60%' }
  });
  document.getElementById('pie-legend').innerHTML = names.map((n,i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${n} ${((vals[i]/total)*100).toFixed(1)}%</div>`
  ).join('');

  const bwrap = document.getElementById('bar-wrap');
  bwrap.style.height = Math.max(160, stocks.length * 52 + 60) + 'px';
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{
        data: pcts,
        backgroundColor: pcts.map(p => p >= 0 ? 'rgba(224,82,82,0.7)' : 'rgba(82,148,224,0.7)'),
        borderRadius: 4, borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#888', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#ccc', autoSkip: false }, grid: { display: false } }
      }
    }
  });
}

function addStock() {
  const name = document.getElementById('inp-name').value.trim();
  const code = document.getElementById('inp-code').value.trim();
  const qty  = parseInt(document.getElementById('inp-qty').value);
  const buy  = parseInt(document.getElementById('inp-buy').value);
  const cur  = parseInt(document.getElementById('inp-cur').value);
  const date = document.getElementById('inp-date').value || today();
  const msg  = document.getElementById('add-msg');
  if (!name || !qty || !buy || !cur) { msg.className='msg err'; msg.textContent='⚠ 종목명, 수량, 단가, 현재가를 모두 입력해주세요.'; return; }
  const ei = stocks.findIndex(s => s.name === name);
  if (ei >= 0) {
    const s = stocks[ei];
    const totalCost = s.qty * s.avgPrice + qty * buy;
    s.qty += qty; s.avgPrice = Math.round(totalCost / s.qty); s.curPrice = cur;
  } else {
    stocks.push({ name, code: code||'------', qty, avgPrice: buy, curPrice: cur, date });
  }
  history.push({ date, name, type:'buy', qty, price: buy });
  msg.className='msg'; msg.textContent=`✓ ${name} ${fmt(qty)}주 추가 완료`;
  ['inp-name','inp-code','inp-qty','inp-buy','inp-cur'].forEach(id => document.getElementById(id).value='');
  save(); refresh();
}

function addSell() {
  const name  = document.getElementById('sell-name').value;
  const qty   = parseInt(document.getElementById('sell-qty').value);
  const price = parseInt(document.getElementById('sell-price').value);
  const date  = document.getElementById('sell-date').value || today();
  const msg   = document.getElementById('sell-msg');
  const idx   = stocks.findIndex(s => s.name === name);
  if (idx < 0 || !qty || !price) { msg.className='msg err'; msg.textContent='⚠ 수량과 단가를 입력해주세요.'; return; }
  if (stocks[idx].qty < qty) { msg.className='msg err'; msg.textContent=`⚠ 보유 수량(${stocks[idx].qty}주)보다 많습니다.`; return; }
  stocks[idx].qty -= qty;
  if (stocks[idx].qty === 0) stocks.splice(idx,1);
  history.push({ date, name, type:'sell', qty, price });
  msg.className='msg'; msg.textContent=`✓ ${name} ${fmt(qty)}주 매도 기록 완료`;
  document.getElementById('sell-qty').value='';
  document.getElementById('sell-price').value='';
  save(); refresh();
}

function updatePrice(i) {
  const val = parseInt(document.getElementById(`upd-${i}`).value);
  if (!val || val <= 0) return;
  stocks[i].curPrice = val;
  save(); refresh();
}

function removeStock(i) {
  if (!confirm(`${stocks[i].name}을(를) 삭제할까요?`)) return;
  stocks.splice(i,1); save(); refresh();
}

function removeHistory(i) {
  history.splice(i,1); save(); renderHistory();
}

function refresh() {
  renderMetrics(); renderTable(); renderUpdateTable(); renderHistory();
}

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'chart') setTimeout(renderCharts, 50);
}

// Header date
const now = new Date();
document.getElementById('header-date').textContent = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
document.getElementById('inp-date').value = today();
document.getElementById('sell-date').value = today();

refresh();
</script>
</body>
</html>
